<div>
  <h2>Program Lecture Schedule Form Dialog</h2>
  <p>
    This is a placeholder for the Program Lecture Schedule Form Dialog
    component.
  </p>
  <hr />

  <p><strong>Subject:</strong> {{ data.subject.name }}</p>
  <p><strong>Day:</strong> {{ data.day.value }}</p>
  <p>
    <strong>Period:</strong> {{ data.period.startTime }} -
    {{ data.period.endTime }}
  </p>
  <hr />

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-group">
      <label for="instructor">Instructor</label>
      <ng-select
        formControlName="instructor"
        [items]="instructors"
        bindLabel="name"
        bindValue="id"
        [loading]="loading"
        [virtualScroll]="true"
        [typeahead]="typeahead$"
        (search)="typeahead$.next($event.term)"
        (scrollToEnd)="loadMore()"
        placeholder="Select Instructor"
      >
      </ng-select>
    </div>

    <div class="form-group">
      <label for="maxSlots">Max Slots</label>
      <input
        type="number"
        class="form-control"
        id="maxSlots"
        formControlName="maxSlots"
      />
    </div>

    <button type="submit" class="btn btn-primary" [disabled]="form.invalid">
      Save
    </button>
  </form>
</div>
