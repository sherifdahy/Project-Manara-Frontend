<ng-container>
  <!-- Year Header -->
  <div
    class="year-header d-flex flex-column flex-lg-row justify-content-between align-items-start align-items-lg-center mb-3"
  >
    <div
      class="first-section d-flex flex-column flex-lg-row align-items-start align-items-lg-center mb-3 mb-lg-0"
    >
      <a
        [routerLink]="['/faculty-administration/years']"
        class="back-btn btn me-0 me-lg-3 mb-2 mb-lg-0"
      >
        <i class="fa-solid fa-arrow-left me-2"></i> Back
      </a>
      <div class="texts"></div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tab-container my-3">
    <ul class="nav nav-pills d-flex flex-column flex-lg-row">
      <li class="nav-item me-0 me-lg-2 mb-2 mb-lg-0">
        <a
          class="nav-link w-100 w-lg-auto"
          routerLink="overview"
          routerLinkActive="active"
          hasPermission="years:read"
          [routerLinkActiveOptions]="{ exact: false }"
        >
          <i class="fa-solid fa-chart-line me-2"></i> Overview
        </a>
      </li>

      <li class="nav-item me-0 me-lg-2 mb-2 mb-lg-0">
        <a
          class="nav-link w-100 w-lg-auto"
          routerLink="edit"
          routerLinkActive="active"
          hasPermission="years:update"
        >
          <i class="fa-solid fa-gear me-2"></i> Edit
        </a>
      </li>
    </ul>
  </div>

  <!-- Router Outlet -->
  <div class="tab-content-wrapper">
    <router-outlet></router-outlet>
  </div>
</ng-container>
