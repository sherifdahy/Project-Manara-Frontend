<div class="container-fluid px-0">
  <form [formGroup]="yearForm" (ngSubmit)="onSave()">
    <div class="row g-3">
      <!-- Left Column - Basic Information -->
      <div class="col-12 col-lg-8">
        <!-- Basic Information Card -->
        <div class="settings-card mb-3">
          <div class="card-header-custom">
            <div class="header-icon">
              <i class="fa-solid fa-calendar-days"></i>
            </div>
            <div>
              <h5 class="card-title-custom">Basic Information</h5>
              <p class="card-subtitle-custom">
                General year details and description
              </p>
            </div>
          </div>

          <div class="card-body-custom">
            <!-- Year Name -->
            <div class="form-group-custom">
              <label class="form-label-custom">
                <i class="fas fa-pen me-1"></i>
                Year Name <span class="required-mark">*</span>
              </label>
              <input
                formControlName="name"
                [class.invalid]="
                  yearForm.get('name')?.invalid && yearForm.get('name')?.touched
                "
                type="text"
                class="form-control-custom"
                placeholder="Enter year name e.g. 2025"
              />
              <app-display-error
                [control]="yearForm.get('name')"
              ></app-display-error>
            </div>

            <!-- Start Date -->
            <div class="form-group-custom">
              <label class="form-label-custom">
                <i class="fas fa-calendar-plus me-1"></i>
                Start Date <span class="required-mark">*</span>
              </label>
              <input
                formControlName="startDate"
                [class.invalid]="
                  yearForm.get('startDate')?.invalid &&
                  yearForm.get('startDate')?.touched
                "
                type="date"
                class="form-control-custom"
              />
              <app-display-error
                [control]="yearForm.get('startDate')"
              ></app-display-error>
            </div>

            <!-- End Date -->
            <div class="form-group-custom">
              <label class="form-label-custom">
                <i class="fas fa-calendar-minus me-1"></i>
                End Date <span class="required-mark">*</span>
              </label>
              <input
                formControlName="endDate"
                [class.invalid]="
                  yearForm.get('endDate')?.invalid &&
                  yearForm.get('endDate')?.touched
                "
                type="date"
                class="form-control-custom"
              />
              <app-display-error
                [control]="yearForm.get('endDate')"
              ></app-display-error>
            </div>

            <!-- Active Term -->
            <div class="form-group-custom">
              <label class="form-label-custom">
                <i class="fas fa-layer-group me-1"></i>
                Active Term <span class="required-mark">*</span>
              </label>
              <div class="input-with-icon">
                <select
                  formControlName="activeTermId"
                  class="form-control-custom with-icon"
                >
                  <option value="" disabled selected>Select active term</option>
                  <option *ngFor="let term of terms$ | async" [value]="term.id">
                    {{ term.name }}
                  </option>
                </select>
                <i class="fa-solid fa-chevron-down input-icon"></i>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Right Column - Preview & Actions -->
      <div class="col-12 col-lg-4">
        <!-- Preview Card -->
        <div class="settings-card sticky-card">
          <div class="card-header-custom">
            <div class="header-icon">
              <i class="fa-solid fa-eye"></i>
            </div>
            <div>
              <h5 class="card-title-custom">Preview</h5>
              <p class="card-subtitle-custom">How it will appear</p>
            </div>
          </div>

          <div class="card-body-custom">
            <!-- Preview Content -->
            <div class="preview-section">
              <div class="preview-header">
                <div class="preview-icon">
                  <i class="fa-solid fa-calendar-days"></i>
                </div>
                <h6 class="preview-title">
                  {{ yearForm.get('name')?.value || 'year Name' }}
                </h6>
              </div>

              <div class="preview-info-list">
                <div class="preview-info-item">
                  <i class="fa-solid fa-calendar-plus"></i>
                  <span>{{
                    yearForm.get('startDate')?.value || 'startDate'
                  }}</span>
                </div>
                <div class="preview-info-item">
                  <i class="fa-solid fa-calendar-minus"></i>
                  <span>{{ yearForm.get('endDate')?.value || 'endDate' }}</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Actions Card -->
        <div class="settings-card mt-3">
          <div class="card-body-custom">
            <div class="actions-section">
              <button
                type="submit"
                class="btn-primary-custom w-100 mb-2"
                [disabled]="!yearForm.valid || !yearForm.dirty"
              >
                <i class="fa-solid fa-check me-2"></i> Save Changes
              </button>
            </div>

            <!-- Form Status -->
            <div class="form-status mt-3" *ngIf="yearForm.dirty">
              <div class="alert-warning-custom">
                <i class="fa-solid fa-exclamation-triangle me-2"></i>
                You have unsaved changes
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </form>
</div>
